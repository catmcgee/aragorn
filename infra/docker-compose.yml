services:
  postgres:
    image: postgres:16
    container_name: aragorn-postgres
    environment:
      POSTGRES_USER: aragorn
      POSTGRES_PASSWORD: aragorn
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aragorn"]
      interval: 2s
      timeout: 2s
      retries: 20
